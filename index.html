<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Currency Converter</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: #f5f6f8;
  color: #1e293b;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
}

.flag { display: inline-block; width: 16px; height: 12px; border-radius: 1px; vertical-align: middle; }

/* ====== CLIENT AREA ====== */
.client-area {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.client-header {
  background: #1e3a5f;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.client-header h1 {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.client-header .header-flags { display: flex; align-items: center; gap: 5px; }
.client-header .header-flags img { width: 20px; height: 15px; border-radius: 1px; }

.client-body {
  flex: 1;
  padding: 18px 20px 14px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* Converter */
.converter { flex-shrink: 0; }
.converter-label {
  font-size: 11px;
  font-weight: 500;
  color: #64748b;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.converter-input-wrap { position: relative; }
.converter-input-wrap input {
  width: 100%;
  padding: 10px 0;
  font-size: 28px;
  font-weight: 700;
  color: #1e293b;
  border: none;
  border-bottom: 1.5px solid #e2e8f0;
  outline: none;
  background: transparent;
  transition: border-color .2s;
  letter-spacing: -0.3px;
}
.converter-input-wrap input:focus { border-color: #1e3a5f; }
.converter-input-wrap input::placeholder { color: #cbd5e1; font-weight: 400; font-size: 22px; }
.converter-input-wrap .ccy-badge {
  position: absolute;
  right: 0;
  bottom: 12px;
  font-size: 13px;
  font-weight: 600;
  color: #94a3b8;
  display: flex;
  align-items: center;
  gap: 4px;
}

.converter-swap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 0 6px;
  color: #94a3b8;
  font-size: 12px;
}
.converter-swap .arrow { font-size: 16px; color: #cbd5e1; }
.converter-swap .from-to { display: flex; align-items: center; gap: 6px; }

/* Rate panel */
.rate-panel {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 0;
  margin: 6px 0 8px;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
}
.rate-panel .rp-item {
  flex: 1;
  text-align: center;
  padding: 6px 4px;
  border-right: 1px solid #e2e8f0;
}
.rate-panel .rp-item:last-child { border-right: none; }
.rate-panel .rp-item .rp-label {
  font-size: 10px;
  color: #94a3b8;
  letter-spacing: 0.3px;
  margin-bottom: 1px;
}
.rate-panel .rp-item .rp-label .cc-note { color: #a3b8cc; }
.rate-panel .rp-item .rp-value {
  font-size: 15px;
  font-weight: 700;
  color: #1e3a5f;
}
.rate-panel .rp-item .rp-sub {
  font-size: 9px;
  color: #a3b8cc;
  margin-top: 1px;
}

.result-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1.5px solid #e2e8f0;
}
.result-row .result-ccy {
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.result-row .result-value {
  font-size: 28px;
  font-weight: 800;
  color: #1e3a5f;
  letter-spacing: -0.3px;
}
.result-row .result-value.placeholder { color: #cbd5e1; font-weight: 400; font-size: 22px; }

/* Currency table */
.currency-section { margin-top: auto; padding-top: 12px; }
.currency-section .section-label {
  font-size: 10px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.currency-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px 0;
}
.currency-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid #f1f4f9;
}
.currency-item .left { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: #475569; }
.currency-item .right { font-size: 12px; color: #64748b; font-weight: 500; }
.currency-item .right .val { color: #1e293b; font-weight: 600; }

/* Footer */
.client-footer {
  flex-shrink: 0;
  padding: 4px 20px 10px;
  text-align: right;
  font-size: 10px;
  color: #cbd5e1;
}
.client-footer .date { font-size: 11px; color: #94a3b8; margin-bottom: 1px; }

/* Manual rate */
.manual-rate-area { display: none; flex-shrink: 0; margin-bottom: 8px; }
.manual-rate-area.show { display: block; }
.manual-rate-area .hint { font-size: 11px; color: #dc2626; margin-bottom: 2px; }
.manual-rate-area input {
  width: 100%;
  padding: 6px 0;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-bottom: 1.5px solid #dc2626;
  outline: none;
  background: transparent;
}

/* ====== DIVIDER ====== */
.internal-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  margin: 0;
  color: #94a3b8;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.internal-divider::before,
.internal-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

/* ====== INTERNAL ====== */
.internal-area {
  background: #f1f4f9;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  padding: 16px 20px;
  margin-top: 0;
}
.internal-area .section-title {
  font-size: 13px;
  font-weight: 600;
  color: #1e3a5f;
  margin-bottom: 10px;
}

.int-form { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; flex-wrap: wrap; }
.int-form .fg { flex: 1; min-width: 70px; }
.int-form .fg label { display: block; font-size: 11px; color: #64748b; margin-bottom: 2px; }
.int-form .fg input {
  width: 100%;
  padding: 6px 0;
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  border: none;
  border-bottom: 1.5px solid #d0d5dd;
  outline: none;
  background: transparent;
}
.int-form .fg input:focus { border-color: #1e3a5f; }
.int-form .total-badge {
  font-size: 13px;
  color: #1e3a5f;
  font-weight: 600;
  white-space: nowrap;
  padding-bottom: 6px;
}

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 13px; margin-bottom: 14px; }
.detail-grid .item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
.detail-grid .item .l { color: #64748b; }
.detail-grid .item .r { font-weight: 600; color: #1e293b; }
.detail-grid .item .r.profit { color: #059669; }

.script-wrap { position: relative; }
.script-wrap textarea {
  width: 100%;
  height: 110px;
  padding: 12px;
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid #d0d5dd;
  border-radius: 4px;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #fff;
  color: #1e293b;
}
.script-wrap textarea:focus { border-color: #1e3a5f; }
.script-copy-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  background: #1e3a5f;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.script-copy-btn:active { transform: scale(.95); }

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity .5s, visibility .5s;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; }
.loader { width: 40px; height: 40px; margin-bottom: 16px; }
.loader .spinner {
  width: 40px; height: 40px;
  border: 3px solid #e2e8f0;
  border-top-color: #1e3a5f;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #64748b; }

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  opacity: 0;
  transition: transform .3s ease, opacity .3s ease;
  z-index: 1000;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 420px) {
  .client-header { padding: 12px 14px; }
  .client-header h1 { font-size: 14px; }
  .client-body { padding: 14px 14px 10px; }
  .converter-input-wrap input { font-size: 24px; }
  .converter-input-wrap input::placeholder { font-size: 18px; }
  .result-row .result-value { font-size: 24px; }
  .result-row .result-value.placeholder { font-size: 18px; }
  .currency-grid { grid-template-columns: 1fr; gap: 0; }
  .currency-item { padding: 4px 0; }
  .currency-item .left { font-size: 11px; }
  .currency-item .right { font-size: 11px; }
  .internal-area { padding: 14px; }
}
@media (max-height: 640px) {
  .client-header { padding: 10px 14px; }
  .client-body { padding: 10px 14px 6px; }
  .converter-input-wrap input { font-size: 20px; padding: 6px 0; }
  .converter-input-wrap input::placeholder { font-size: 16px; }
  .rate-panel { margin: 4px 0 6px; }
  .rate-panel .rp-item .rp-value { font-size: 13px; }
  .result-row { padding: 6px 0; }
  .result-row .result-value { font-size: 20px; }
  .result-row .result-value.placeholder { font-size: 16px; }
  .currency-section { padding-top: 6px; }
  .currency-item { padding: 3px 0; }
  .currency-item .left { font-size: 10px; }
  .currency-item .right { font-size: 10px; }
  .client-footer { padding: 2px 14px 8px; font-size: 9px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"><div class="spinner"></div></div>
  <div class="loading-text">Loading latest rates...</div>
</div>

<div class="toast" id="toast"></div>

<div class="container">

  <!-- ========== CLIENT AREA ========== -->
  <div class="client-area">

    <div class="client-header">
      <h1>Currency Converter</h1>
      <div class="header-flags">
        <img src="https://flagcdn.com/24x18/my.png" alt="MY" loading="lazy">
        <img src="https://flagcdn.com/24x18/cn.png" alt="CN" loading="lazy">
      </div>
    </div>

    <div class="client-body">

      <div class="converter">
        <div class="converter-label">Amount in MYR</div>
        <div class="converter-input-wrap">
          <input type="text" id="myrInput" inputmode="decimal" placeholder="0.00">
          <span class="ccy-badge"><img class="flag" src="https://flagcdn.com/16x12/my.png" alt="" loading="lazy"> MYR</span>
        </div>

        <div class="rate-panel" id="ratePanel">
          <div class="rp-item">
            <div class="rp-label">Buy rate</div>
            <div class="rp-value" id="buyRateDisplay">—</div>
            <div class="rp-sub">1 CNY</div>
          </div>
          <div class="rp-item">
            <div class="rp-label">Sell rate <span class="cc-note">(incl. cc fee)</span></div>
            <div class="rp-value" id="sellRateDisplay">—</div>
            <div class="rp-sub">1 CNY</div>
          </div>
        </div>

        <div class="result-row">
          <span class="result-ccy"><img class="flag" src="https://flagcdn.com/16x12/cn.png" alt="" loading="lazy"> CNY</span>
          <span class="result-value" id="cnyDisplay">0.00</span>
        </div>
      </div>

      <div class="manual-rate-area" id="manualRateArea">
        <div class="hint">Failed to fetch rates. Enter MYR rate manually:</div>
        <input type="number" id="manualRate" step="0.0001" min="0.01" value="0.61" placeholder="0.61">
      </div>

      <!-- Currency table -->
      <div class="currency-section">
        <div class="section-label">More Currencies</div>
        <div class="currency-grid" id="currencyGrid"></div>
      </div>

    </div>

    <div class="client-footer">
      <div class="date" id="dateDisplay"></div>
      Reference rates only
    </div>

  </div>

  <!-- ========== DIVIDER ========== -->
  <div class="internal-divider">内部参考</div>

  <!-- ========== INTERNAL ========== -->
  <div class="internal-area">

    <div class="section-title">票务信息</div>

    <div class="int-form">
      <div class="fg">
        <label><img class="flag" src="https://flagcdn.com/16x12/my.png" alt="" loading="lazy">单张票价</label>
        <input type="number" id="perPrice" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="fg" style="flex:0 0 70px">
        <label>张数</label>
        <input type="number" id="qtyInput" value="2" min="1" step="1">
      </div>
      <div class="total-badge" id="totalBadge">RM —</div>
    </div>

    <div class="section-title">计算明细</div>

    <div class="detail-grid">
      <div class="item"><span class="l">官方汇率</span><span class="r" id="intOfficial">—</span></div>
      <div class="item"><span class="l">报价汇率</span><span class="r" id="intQuote">—</span></div>
      <div class="item"><span class="l">马币总计</span><span class="r" id="intMYR">—</span></div>
      <div class="item"><span class="l">人民币总价</span><span class="r" id="intCNY">—</span></div>
      <div class="item"><span class="l">预计利润</span><span class="r profit" id="intProfit">—</span></div>
    </div>

    <div class="section-title">回复话术</div>

    <div class="script-wrap">
      <textarea id="scriptText" readonly placeholder="填写票价和张数后自动生成..."></textarea>
      <button class="script-copy-btn" id="copyBtn">复制</button>
    </div>

  </div>

</div>

<script>
(function() {
  let officialRate = null;
  let allRates = {};
  let updating = false;

  const DOM = {
    loading: document.getElementById('loadingOverlay'),
    myrInput: document.getElementById('myrInput'),
    cnyDisplay: document.getElementById('cnyDisplay'),
    buyRateDisplay: document.getElementById('buyRateDisplay'),
    sellRateDisplay: document.getElementById('sellRateDisplay'),
    dateDisplay: document.getElementById('dateDisplay'),
    currencyGrid: document.getElementById('currencyGrid'),
    manualRateArea: document.getElementById('manualRateArea'),
    manualRate: document.getElementById('manualRate'),
    perPrice: document.getElementById('perPrice'),
    qtyInput: document.getElementById('qtyInput'),
    totalBadge: document.getElementById('totalBadge'),
    intOfficial: document.getElementById('intOfficial'),
    intQuote: document.getElementById('intQuote'),
    intMYR: document.getElementById('intMYR'),
    intCNY: document.getElementById('intCNY'),
    intProfit: document.getElementById('intProfit'),
    scriptText: document.getElementById('scriptText'),
    copyBtn: document.getElementById('copyBtn'),
    toast: document.getElementById('toast'),
  };

  const currencies = [
    { code: 'MYR', country: 'my', name: 'Malaysian Ringgit' },
    { code: 'USD', country: 'us', name: 'US Dollar' },
    { code: 'EUR', country: 'eu', name: 'Euro' },
    { code: 'GBP', country: 'gb', name: 'British Pound' },
    { code: 'JPY', country: 'jp', name: 'Japanese Yen' },
    { code: 'SGD', country: 'sg', name: 'Singapore Dollar' },
    { code: 'THB', country: 'th', name: 'Thai Baht' },
    { code: 'AUD', country: 'au', name: 'Australian Dollar' },
    { code: 'KRW', country: 'kr', name: 'South Korean Won' },
  ];

  let toastTimer = null;
  function showToast(msg) {
    const el = DOM.toast;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function fmt(v, d) { return Number(v).toFixed(d); }

  function fmtRate(v) {
    if (v >= 1) return fmt(v, 4);
    if (v >= 0.1) return fmt(v, 4);
    if (v >= 0.01) return fmt(v, 4);
    return fmt(v, 4);
  }

  function renderCurrencyGrid() {

  function estimateQty(totalMYR) {
    return Math.max(1, Math.round(totalMYR / 110));
  }

  function calcSellRate(officialRate, totalMYR) {
    const costCNY = totalMYR / officialRate;
    const finalCNY = Math.round(costCNY * 1.1 * 100) / 100;
    const sellRate = totalMYR / finalCNY;
    return { sellRate, finalCNY, fee: null };
  }

  function renderCurrencyGrid() {
    let html = '';
    for (const c of currencies) {
      if (c.code === 'MYR') continue;
      const rate = allRates[c.code];
      const val = rate != null ? fmtRate(rate) : '—';
      html += '<div class="currency-item">'
        + '<span class="left"><img class="flag" src="https://flagcdn.com/16x12/' + c.country + '.png" alt="" loading="lazy"> ' + c.code + '</span>'
        + '<span class="right">1 CNY = <span class="val">' + val + '</span></span>'
        + '</div>';
    }
    DOM.currencyGrid.innerHTML = html;
  }

  function updateAll() {
    if (officialRate === null) return;

    const totalMYR = parseFloat(DOM.myrInput.value) || 0;

    if (totalMYR <= 0) {
      DOM.cnyDisplay.textContent = '0.00';
      DOM.cnyDisplay.className = 'result-value';
      DOM.buyRateDisplay.textContent = '—';
      DOM.sellRateDisplay.textContent = '—';
      clearInternal();
      return;
    }

    const qty = parseInt(DOM.qtyInput.value) || 0;
    const { sellRate, finalCNY } = calcSellRate(officialRate, totalMYR);

    DOM.buyRateDisplay.textContent = fmt(officialRate, 4);
    DOM.sellRateDisplay.textContent = fmt(sellRate, 4);
    DOM.cnyDisplay.textContent = fmt(finalCNY, 2);
    DOM.cnyDisplay.className = 'result-value';

    // Internal
    const perPrice = parseFloat(DOM.perPrice.value) || 0;

    DOM.totalBadge.textContent = perPrice > 0 && qty > 0
      ? 'RM ' + fmt(perPrice * qty, 2)
      : 'RM —';

    DOM.intOfficial.textContent = '1 CNY = ' + fmt(officialRate, 4) + ' MYR';
    DOM.intQuote.textContent = '1 CNY = ' + fmt(sellRate, 4) + ' MYR';
    DOM.intMYR.textContent = 'RM ' + fmt(totalMYR, 2);
    DOM.intCNY.textContent = '¥' + fmt(finalCNY, 2);

    const costCNY = totalMYR / officialRate;
    const profit = finalCNY - costCNY;
    DOM.intProfit.textContent = '¥' + fmt(profit, 2);

    if (perPrice > 0 && qty > 0) {
      DOM.scriptText.value = '亲亲，' + qty + ' 张车票一共是 ' + fmt(perPrice * qty, 2) + ' 马币。我这边是纯代买，不收任何额外的手续费和跑腿费哦。今天的实时结算汇率是 1 人民币 = ' + fmt(sellRate, 4) + ' 马币。总共是 ' + fmt(finalCNY, 2) + ' 元人民币。您直接转账就行，付完款我这边立刻登录官网帮您处理，把 PDF 车票发您。';
    }
  }

  function clearInternal() {
    DOM.totalBadge.textContent = 'RM —';
    DOM.intOfficial.textContent = '—';
    DOM.intQuote.textContent = '—';
    DOM.intMYR.textContent = '—';
    DOM.intCNY.textContent = '—';
    DOM.intProfit.textContent = '—';
    DOM.scriptText.value = '';
  }

  DOM.myrInput.addEventListener('input', function() {
    if (updating) return;
    const totalMYR = parseFloat(this.value) || 0;
    if (totalMYR > 0) {
      const qty = estimateQty(totalMYR);
      DOM.qtyInput.value = qty;
      DOM.perPrice.value = fmt(totalMYR / qty, 2);
    }
    updateAll();
  });

  function syncFromInternal() {
    if (updating) return;
    const perPrice = parseFloat(DOM.perPrice.value) || 0;
    const qty = parseInt(DOM.qtyInput.value) || 0;
    if (perPrice > 0 && qty > 0) {
      updating = true;
      DOM.myrInput.value = fmt(perPrice * qty, 2);
      updating = false;
      updateAll();
    } else {
      updateAll();
    }
  }

  DOM.perPrice.addEventListener('input', syncFromInternal);

  DOM.qtyInput.addEventListener('input', function() {
    if (!updating) {
      const totalMYR = parseFloat(DOM.myrInput.value) || 0;
      const qty = parseInt(this.value) || 1;
      if (totalMYR > 0 && qty > 0) {
        updating = true;
        DOM.perPrice.value = fmt(totalMYR / qty, 2);
        updating = false;
      }
      updateAll();
    }
  });

  async function fetchRates() {
    try {
      const res = await fetch('/api/rate');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allRates = data.rates || {};
      const myr = allRates.MYR;
      if (!myr || myr <= 0) throw new Error('Invalid MYR rate');
      return myr;
    } catch (e) {
      console.warn('API failed:', e);
      return null;
    }
  }

  async function init() {
    let rate = await fetchRates();

    if (rate === null) {
      DOM.manualRateArea.classList.add('show');
      DOM.manualRate.addEventListener('input', function() {
        const r = parseFloat(this.value);
        if (r && r > 0) {
          officialRate = r;
          allRates.MYR = r;
          updateAll();
        }
      });
      rate = parseFloat(DOM.manualRate.value) || 0.61;
    }

    officialRate = rate;
    allRates.MYR = rate;
    DOM.manualRate.value = rate;

    renderCurrencyGrid();
    DOM.loading.classList.add('hidden');
    DOM.dateDisplay.textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    updateAll();
  }

  DOM.copyBtn.addEventListener('click', function() {
    const text = DOM.scriptText.value;
    if (!text) { showToast('请先填写票价和张数'); return; }
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制');
    }).catch(() => {
      DOM.scriptText.select();
      document.execCommand('copy');
      showToast('已复制');
    });
  });

  init();
})();
</script>
</body>
</html>
