<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>汇率换算器</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: #f5f6f8;
  color: #1e293b;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
}

.flag { display: inline-block; width: 18px; height: 14px; vertical-align: middle; border-radius: 1px; margin-right: 2px; }
.flag-sm { width: 14px; height: 10px; }

/* ====== TOP: Client Screenshot Area ====== */
.client-area {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.client-header {
  background: #1e3a5f;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.client-header h1 {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.client-header .header-flags { display: flex; align-items: center; gap: 6px; }
.client-header .header-flags img { width: 20px; height: 15px; border-radius: 1px; }

.client-body {
  flex: 1;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
}

/* Rate board - bank style table */
.rate-board {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.rate-cell {
  text-align: center;
  padding: 8px 4px;
  border-right: 1px solid #e2e8f0;
}
.rate-cell:last-child { border-right: none; }
.rate-cell .label { font-size: 11px; color: #64748b; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; gap: 3px; }
.rate-cell .value { font-size: 17px; font-weight: 700; color: #1e3a5f; }
.rate-cell .sub { font-size: 10px; color: #94a3b8; margin-top: 1px; }

/* Divider */
.section-divider { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; flex-shrink: 0; }

/* Form - underline style */
.form-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-shrink: 0;
}
.form-row .form-group { flex: 1; }
.form-group { margin-bottom: 0; }
.form-group label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.form-group input {
  width: 100%;
  padding: 6px 0;
  font-size: 20px;
  font-weight: 600;
  color: #1e293b;
  border: none;
  border-bottom: 1.5px solid #d0d5dd;
  outline: none;
  background: transparent;
  transition: border-color .2s;
}
.form-group input:focus { border-color: #1e3a5f; }
.form-group input::placeholder { color: #cbd5e1; font-weight: 400; font-size: 16px; }

.total-hint {
  text-align: right;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  margin-bottom: 12px;
  flex-shrink: 0;
}

/* Result box - flex to fill */
.result-box-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.result-box {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  text-align: center;
  padding: 18px;
}
.result-box .result-label {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 2px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.result-box .result-amount {
  font-size: 44px;
  font-weight: 800;
  color: #1e3a5f;
  line-height: 1.1;
  letter-spacing: -1px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.result-box .result-amount .cur { font-size: 20px; font-weight: 600; margin-right: 2px; }
.result-box .result-sub { font-size: 11px; color: #94a3b8; margin-top: 6px; }

/* ====== DIVIDER ====== */
.internal-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  margin: 0;
  color: #94a3b8;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.internal-divider::before,
.internal-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

/* ====== BOTTOM: Internal Reference ====== */
.internal-area {
  background: #f1f4f9;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  padding: 16px 20px;
  margin-top: 0;
}
.internal-area .section-title {
  font-size: 13px;
  font-weight: 600;
  color: #1e3a5f;
  margin-bottom: 10px;
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 13px; margin-bottom: 14px; }
.detail-grid .item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
.detail-grid .item .l { color: #64748b; }
.detail-grid .item .r { font-weight: 600; color: #1e293b; }
.detail-grid .item .r.profit { color: #059669; }

/* Script area */
.script-wrap { position: relative; }
.script-wrap textarea {
  width: 100%;
  height: 110px;
  padding: 12px;
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid #d0d5dd;
  border-radius: 4px;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #fff;
  color: #1e293b;
}
.script-wrap textarea:focus { border-color: #1e3a5f; }
.script-copy-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  background: #1e3a5f;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.script-copy-btn:active { transform: scale(.95); }

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity .5s, visibility .5s;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; }
.loader { width: 40px; height: 40px; margin-bottom: 16px; }
.loader .spinner {
  width: 40px; height: 40px;
  border: 3px solid #e2e8f0;
  border-top-color: #1e3a5f;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #64748b; }

/* Manual rate */
.manual-rate-area { display: none; margin-bottom: 10px; flex-shrink: 0; }
.manual-rate-area.show { display: block; }
.manual-rate-area .hint { font-size: 12px; color: #dc2626; margin-bottom: 4px; }
.manual-rate-area input {
  width: 100%;
  padding: 6px 0;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-bottom: 1.5px solid #dc2626;
  outline: none;
  background: transparent;
}

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  opacity: 0;
  transition: transform .3s ease, opacity .3s ease;
  z-index: 1000;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 420px) {
  .client-header { padding: 12px 14px; }
  .client-header h1 { font-size: 14px; }
  .client-body { padding: 12px 14px; }
  .rate-board { margin-bottom: 0; }
  .rate-cell { padding: 6px 2px; }
  .rate-cell .value { font-size: 15px; }
  .section-divider { margin: 10px 0; }
  .form-group input { font-size: 18px; }
  .total-hint { margin-bottom: 10px; }
  .result-box { padding: 14px; }
  .result-box .result-amount { font-size: 36px; }
  .result-box .result-amount .cur { font-size: 16px; }
  .internal-area { padding: 14px; }
}
@media (max-height: 640px) {
  .client-header { padding: 10px 14px; }
  .client-body { padding: 10px 14px; }
  .rate-cell { padding: 5px 2px; }
  .rate-cell .value { font-size: 14px; }
  .section-divider { margin: 6px 0; }
  .form-group input { font-size: 16px; padding: 4px 0; }
  .result-box { padding: 10px; }
  .result-box .result-amount { font-size: 30px; }
  .result-box .result-amount .cur { font-size: 14px; }
  .total-hint { margin-bottom: 6px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"><div class="spinner"></div></div>
  <div class="loading-text">正在获取最新汇率...</div>
</div>

<div class="toast" id="toast"></div>

<div class="container">

  <!-- ========== CLIENT AREA (screenshot this) ========== -->
  <div class="client-area" id="clientArea">

    <div class="client-header">
      <h1>MYR ⇄ CNY 汇率换算</h1>
      <div class="header-flags">
        <img src="https://flagcdn.com/24x18/cn.png" alt="CN" loading="lazy">
        <img src="https://flagcdn.com/24x18/my.png" alt="MY" loading="lazy">
      </div>
    </div>

    <div class="client-body">

      <!-- Rate Board -->
      <div class="rate-board">
        <div class="rate-cell">
          <div class="label"><img class="flag" src="https://flagcdn.com/18x14/cn.png" alt="" loading="lazy">买入</div>
          <div class="value" id="buyRate">—</div>
          <div class="sub">1 CNY <img class="flag flag-sm" src="https://flagcdn.com/14x10/my.png" alt="" loading="lazy"></div>
        </div>
        <div class="rate-cell">
          <div class="label"><img class="flag" src="https://flagcdn.com/18x14/cn.png" alt="" loading="lazy">卖出</div>
          <div class="value" id="sellRate">—</div>
          <div class="sub">1 CNY <img class="flag flag-sm" src="https://flagcdn.com/14x10/my.png" alt="" loading="lazy"></div>
        </div>
        <div class="rate-cell">
          <div class="label">中间汇率</div>
          <div class="value" id="midRate">—</div>
          <div class="sub">1 CNY</div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- Inputs -->
      <div class="form-row">
        <div class="form-group">
          <label><img class="flag" src="https://flagcdn.com/18x14/my.png" alt="" loading="lazy">单张票价</label>
          <input type="number" id="ticketPrice" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group" style="flex:0 0 80px">
          <label>张数</label>
          <input type="number" id="ticketQty" value="2" min="1" step="1">
        </div>
      </div>

      <div class="total-hint" id="totalHint">
        <img class="flag flag-sm" src="https://flagcdn.com/14x10/my.png" alt="" loading="lazy"> 马币总计: RM —
      </div>

      <!-- Manual rate -->
      <div class="manual-rate-area" id="manualRateArea">
        <div class="hint">汇率获取失败，请手动输入</div>
        <input type="number" id="manualRate" step="0.0001" min="0.01" value="0.61" placeholder="0.61">
      </div>

      <!-- Result -->
      <div class="result-box-wrap">
        <div class="result-box" id="resultBox">
          <div class="result-label"><img class="flag" src="https://flagcdn.com/18x14/cn.png" alt="" loading="lazy">人民币金额</div>
          <div class="result-amount"><span class="cur">CNY</span><span id="resultAmount">—</span></div>
          <div class="result-sub">汇率仅供参考，以实际出票为准</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ========== INTERNAL DIVIDER ========== -->
  <div class="internal-divider">内部参考</div>

  <!-- ========== INTERNAL AREA ========== -->
  <div class="internal-area">

    <div class="section-title">计算明细</div>

    <div class="detail-grid">
      <div class="item"><span class="l">官方汇率</span><span class="r" id="intOfficial">—</span></div>
      <div class="item"><span class="l">报价汇率</span><span class="r" id="intQuote">—</span></div>
      <div class="item"><span class="l">马币总计</span><span class="r" id="intMYR">—</span></div>
      <div class="item"><span class="l">张数</span><span class="r" id="intQty">—</span></div>
      <div class="item"><span class="l">人民币总价</span><span class="r" id="intCNY">—</span></div>
      <div class="item"><span class="l">预计利润</span><span class="r profit" id="intProfit">—</span></div>
    </div>

    <div class="section-title">回复话术</div>

    <div class="script-wrap">
      <textarea id="scriptText" readonly placeholder="填写票价和张数后自动生成..."></textarea>
      <button class="script-copy-btn" id="copyBtn">复制</button>
    </div>

  </div>

</div>

<script>
(function() {
  let officialRate = null;
  let quoteRate = null;

  const DOM = {
    loading: document.getElementById('loadingOverlay'),
    buyRate: document.getElementById('buyRate'),
    sellRate: document.getElementById('sellRate'),
    midRate: document.getElementById('midRate'),
    ticketPrice: document.getElementById('ticketPrice'),
    ticketQty: document.getElementById('ticketQty'),
    totalHint: document.getElementById('totalHint'),
    resultAmount: document.getElementById('resultAmount'),
    manualRateArea: document.getElementById('manualRateArea'),
    manualRate: document.getElementById('manualRate'),
    intOfficial: document.getElementById('intOfficial'),
    intQuote: document.getElementById('intQuote'),
    intMYR: document.getElementById('intMYR'),
    intQty: document.getElementById('intQty'),
    intCNY: document.getElementById('intCNY'),
    intProfit: document.getElementById('intProfit'),
    scriptText: document.getElementById('scriptText'),
    copyBtn: document.getElementById('copyBtn'),
    toast: document.getElementById('toast'),
  };

  let toastTimer = null;
  function showToast(msg) {
    const el = DOM.toast;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function fmt(v, decimals) {
    return Number(v).toFixed(decimals);
  }

  function calculate() {
    if (officialRate === null) return;

    const perPrice = parseFloat(DOM.ticketPrice.value);
    const qty = parseInt(DOM.ticketQty.value) || 0;

    if (!perPrice || perPrice <= 0 || !qty || qty <= 0) {
      DOM.totalHint.innerHTML = '<img class="flag flag-sm" src="https://flagcdn.com/14x10/my.png" alt="" loading="lazy"> 马币总计: RM —';
      DOM.resultAmount.textContent = '—';
      DOM.sellRate.textContent = '—';
      DOM.midRate.textContent = '—';
      DOM.intOfficial.textContent = '—';
      DOM.intQuote.textContent = '—';
      DOM.intMYR.textContent = '—';
      DOM.intQty.textContent = '—';
      DOM.intCNY.textContent = '—';
      DOM.intProfit.textContent = '—';
      DOM.scriptText.value = '';
      return;
    }

    const totalMYR = perPrice * qty;
    const qRate = officialRate - 0.05;
    quoteRate = qRate;

    DOM.sellRate.textContent = fmt(qRate, 4);
    DOM.buyRate.textContent = fmt(officialRate, 4);
    DOM.midRate.textContent = fmt((officialRate + qRate) / 2, 4);

    DOM.totalHint.innerHTML = '<img class="flag flag-sm" src="https://flagcdn.com/14x10/my.png" alt="" loading="lazy"> 马币总计: RM ' + fmt(totalMYR, 2);

    let cny = totalMYR / qRate;
    if (qty >= 4) {
      cny = Math.floor(cny / 10) * 10;
    } else {
      cny = Math.round(cny);
    }

    DOM.resultAmount.textContent = fmt(cny, 0);

    DOM.intOfficial.textContent = '1 CNY = ' + fmt(officialRate, 4) + ' MYR';
    DOM.intQuote.textContent = '1 CNY = ' + fmt(qRate, 4) + ' MYR';
    DOM.intMYR.textContent = 'RM ' + fmt(totalMYR, 2);
    DOM.intQty.textContent = qty + ' 张';
    DOM.intCNY.textContent = '¥' + cny;

    const cost = totalMYR / officialRate;
    const profit = cny - cost;
    DOM.intProfit.textContent = '¥' + fmt(profit, 2);

    const script = `亲亲，${qty} 张车票一共是 ${fmt(totalMYR, 2)} 马币。我这边是纯代买，不收任何额外的手续费和跑腿费哦。今天的实时结算汇率是 1 人民币 = ${fmt(qRate, 4)} 马币。总共是 ${cny} 元人民币。您直接转账就行，付完款我这边立刻登录马铁官网帮您出票，把 PDF 电子票发您。`;
    DOM.scriptText.value = script;
  }

  async function fetchRate() {
    try {
      const res = await fetch('/api/rate');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const rate = data.rates.MYR;
      if (!rate || rate <= 0) throw new Error('Invalid rate');
      return rate;
    } catch (e) {
      console.warn('API failed:', e);
      return null;
    }
  }

  async function init() {
    let rate = await fetchRate();
    if (rate === null) {
      DOM.manualRateArea.classList.add('show');
      DOM.manualRate.addEventListener('input', function() {
        const r = parseFloat(this.value);
        if (r && r > 0) {
          officialRate = r;
          DOM.buyRate.textContent = fmt(r, 4);
          calculate();
        }
      });
      rate = parseFloat(DOM.manualRate.value) || 0.61;
    }

    officialRate = rate;
    DOM.buyRate.textContent = fmt(rate, 4);
    DOM.manualRate.value = rate;

    DOM.loading.classList.add('hidden');
    calculate();
  }

  DOM.ticketPrice.addEventListener('input', calculate);
  DOM.ticketQty.addEventListener('input', calculate);

  DOM.copyBtn.addEventListener('click', function() {
    const text = DOM.scriptText.value;
    if (!text) { showToast('请先填写票价和张数'); return; }
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制');
    }).catch(() => {
      DOM.scriptText.select();
      document.execCommand('copy');
      showToast('已复制');
    });
  });

  init();
})();
</script>
</body>
</html>
