<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>马来西亚火车票代购计价器</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #0ea5e9;
  --primary-dark: #0284c7;
  --secondary: #10b981;
  --secondary-dark: #059669;
  --bg: #f0f9ff;
  --card: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(14,165,233,0.10);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 0;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 20px;
  margin-bottom: 16px;
  transition: opacity .3s;
}

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity .5s, visibility .5s;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; }
.loader { width: 48px; height: 48px; margin-bottom: 16px; }
.loader .spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: var(--text-secondary); }

/* Header */
.header { text-align: center; padding: 16px 0 4px; }
.header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* Rate display */
.rate-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.rate-item { text-align: center; padding: 12px 4px; border-radius: 12px; background: #f8fafc; }
.rate-item .label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
.rate-item .value { font-size: 20px; font-weight: 700; color: var(--text); }
.rate-item .value.highlight { color: var(--secondary-dark); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-group input {
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: #fafbfc;
}
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }

/* Result */
.result-area { text-align: center; }
.result-area .total-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
.result-area .total-amount { font-size: 40px; font-weight: 800; color: var(--primary-dark); line-height: 1.2; }
.result-area .total-amount .currency { font-size: 20px; font-weight: 600; }
.result-area .profit { font-size: 13px; color: var(--text-light); margin-top: 6px; }

/* Manual input */
.manual-rate-area { margin-top: 12px; display: none; }
.manual-rate-area.show { display: block; }
.manual-rate-area .hint { font-size: 13px; color: #dc2626; margin-bottom: 8px; }
.manual-rate-area input { width: 100%; }

/* Copy area */
.copy-area { position: relative; }
.copy-area textarea {
  width: 100%;
  height: 160px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.7;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #fafbfc;
}
.copy-area textarea:focus { border-color: var(--primary); }
.copy-btn {
  position: absolute;
  bottom: 14px;
  right: 14px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.copy-btn:active { transform: scale(.95); }
.copy-btn.copied { opacity: .7; }

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: transform .3s ease, opacity .3s ease;
  z-index: 1000;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 420px) {
  body { padding: 10px; }
  .card { padding: 16px 14px; }
  .rate-grid { gap: 6px; }
  .rate-item .value { font-size: 17px; }
  .result-area .total-amount { font-size: 32px; }
  .header h1 { font-size: 19px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"><div class="spinner"></div></div>
  <div class="loading-text">正在获取今日最新汇率...</div>
</div>

<div class="toast" id="toast"></div>

<div class="container">

  <div class="header">
    <h1>🚄 马铁代购计价器</h1>
    <p>马来西亚火车票跨境代购 · 实时汇率自动换算</p>
  </div>

  <div class="card">
    <div class="rate-grid">
      <div class="rate-item">
        <div class="label">今日官方汇率</div>
        <div class="value" id="officialRate">—</div>
      </div>
      <div class="rate-item">
        <div class="label">你的报价汇率</div>
        <div class="value highlight" id="quoteRate">—</div>
      </div>
      <div class="rate-item">
        <div class="label">应收人民币</div>
        <div class="value" id="cnyResult">—</div>
      </div>
    </div>
    <div class="manual-rate-area" id="manualRateArea">
      <div class="hint">⚠️ 汇率获取失败，请手动输入当前汇率：</div>
      <input type="number" id="manualRate" step="0.0001" min="0.01" value="0.61" placeholder="例如 0.61">
    </div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>车票总马币价格（MYR）</label>
      <input type="number" id="ticketPrice" step="0.01" min="0" placeholder="例如 120.50">
    </div>
    <div class="form-group">
      <label>购票张数</label>
      <input type="number" id="ticketQty" value="2" min="1" step="1">
    </div>
  </div>

  <div class="card">
    <div class="result-area">
      <div class="total-label">人民币应收总价</div>
      <div class="total-amount" id="finalAmount"><span class="currency">¥</span>—</div>
      <div class="profit" id="profitInfo"></div>
    </div>
  </div>

  <div class="card copy-area">
    <textarea id="scriptText" readonly placeholder="填入车票价格和张数后，话术将自动生成..."></textarea>
    <button class="copy-btn" id="copyBtn">📋 一键复制</button>
  </div>

</div>

<script>
(function() {
  // State
  let officialRate = null;
  let quoteRate = null;
  let currentCNY = 0;

  const DOM = {
    loading: document.getElementById('loadingOverlay'),
    officialRate: document.getElementById('officialRate'),
    quoteRate: document.getElementById('quoteRate'),
    cnyResult: document.getElementById('cnyResult'),
    ticketPrice: document.getElementById('ticketPrice'),
    ticketQty: document.getElementById('ticketQty'),
    finalAmount: document.getElementById('finalAmount'),
    profitInfo: document.getElementById('profitInfo'),
    scriptText: document.getElementById('scriptText'),
    copyBtn: document.getElementById('copyBtn'),
    toast: document.getElementById('toast'),
    manualRateArea: document.getElementById('manualRateArea'),
    manualRate: document.getElementById('manualRate'),
  };

  // Toast
  let toastTimer = null;
  function showToast(msg) {
    const el = DOM.toast;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // Format
  function fmt(v, decimals = 4) {
    return Number(v).toFixed(decimals);
  }

  // Core calculation
  function calculate() {
    if (officialRate === null) return;

    const price = parseFloat(DOM.ticketPrice.value);
    const qty = parseInt(DOM.ticketQty.value) || 0;
    if (!price || price <= 0 || !qty || qty <= 0) {
      DOM.finalAmount.innerHTML = '<span class="currency">¥</span>—';
      DOM.profitInfo.textContent = '';
      DOM.cnyResult.textContent = '—';
      DOM.scriptText.value = '';
      return;
    }

    const qRate = officialRate - 0.05;
    quoteRate = qRate;
    DOM.quoteRate.textContent = '1 CNY = ' + fmt(qRate, 4) + ' MYR';

    let cny = price / qRate;
    if (qty >= 4) {
      cny = Math.floor(cny / 10) * 10;
    } else {
      cny = Math.round(cny);
    }
    currentCNY = cny;

    DOM.finalAmount.innerHTML = '<span class="currency">¥</span>' + cny;
    DOM.cnyResult.textContent = '¥' + cny;

    // Profit
    const cost = price / officialRate;
    const profit = cny - cost;
    DOM.profitInfo.textContent = '内部预计利润：¥' + fmt(profit, 2);

    // Script
    const script = `亲亲，车票一共是 ${fmt(price, 2)} 马币。我这边是纯代买，不收任何额外的手续费和跑腿费哦。今天的实时结算汇率是 1 人民币 = ${fmt(qRate, 4)} 马币。总共是 ${cny} 元人民币。您直接转账就行，付完款我这边立刻登录马铁官网帮您出票，把 PDF 电子票发您。`;
    DOM.scriptText.value = script;
  }

  // Fetch rate
  async function fetchRate() {
    try {
      const res = await fetch('https://api.frankfurter.app/latest?from=CNY&to=MYR');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const rate = data.rates.MYR;
      if (!rate || rate <= 0) throw new Error('Invalid rate');
      return rate;
    } catch (e) {
      console.warn('Frankfurter API failed:', e);
      return null;
    }
  }

  async function init() {
    let rate = await fetchRate();
    if (rate === null) {
      DOM.manualRateArea.classList.add('show');
      DOM.manualRate.addEventListener('input', function() {
        const r = parseFloat(this.value);
        if (r && r > 0) {
          officialRate = r;
          DOM.officialRate.textContent = '1 CNY = ' + fmt(r, 4) + ' MYR';
          calculate();
        }
      });
      rate = parseFloat(DOM.manualRate.value) || 0.61;
    }

    officialRate = rate;
    DOM.officialRate.textContent = '1 CNY = ' + fmt(rate, 4) + ' MYR';
    DOM.manualRate.value = rate;

    // Hide loading
    DOM.loading.classList.add('hidden');

    // Trigger initial calc
    calculate();
  }

  // Input events
  DOM.ticketPrice.addEventListener('input', calculate);
  DOM.ticketQty.addEventListener('input', calculate);

  // Copy
  DOM.copyBtn.addEventListener('click', function() {
    const text = DOM.scriptText.value;
    if (!text) { showToast('请先填写车票信息'); return; }
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制到剪贴板');
    }).catch(() => {
      DOM.scriptText.select();
      document.execCommand('copy');
      showToast('✅ 已复制到剪贴板');
    });
  });

  // Start
  init();
})();
</script>
</body>
</html>
