<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>汇率换算器</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: #f5f6f8;
  color: #1e293b;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
}

.flag { display: inline-block; width: 16px; height: 12px; vertical-align: middle; border-radius: 1px; margin-right: 2px; }

/* ====== CLIENT SCREENSHOT AREA ====== */
.client-area {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.client-header {
  background: #1e3a5f;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.client-header h1 {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.client-header .header-flags { display: flex; align-items: center; gap: 6px; }
.client-header .header-flags img { width: 20px; height: 15px; border-radius: 1px; }

.client-body {
  flex: 1;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
}

/* Converter panel */
.converter {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.converter-row { margin-bottom: 0; }
.converter-row .currency-label {
  font-size: 13px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.converter-row input {
  width: 100%;
  padding: 14px 0;
  font-size: 36px;
  font-weight: 700;
  color: #1e293b;
  border: none;
  border-bottom: 2px solid #e2e8f0;
  outline: none;
  background: transparent;
  transition: border-color .2s;
  letter-spacing: -0.5px;
}
.converter-row input:focus { border-color: #1e3a5f; }
.converter-row input::placeholder { color: #cbd5e1; font-weight: 400; font-size: 28px; }

.converter-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 0 6px;
  color: #94a3b8;
  font-size: 20px;
  user-select: none;
}

.converter-result .currency-label {
  font-size: 13px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.converter-result .result-value {
  font-size: 36px;
  font-weight: 800;
  color: #1e3a5f;
  letter-spacing: -0.5px;
  padding: 14px 0;
  border-bottom: 2px solid #e2e8f0;
  min-height: 72px;
  display: flex;
  align-items: center;
}

/* Sell rate footer */
.sell-rate-footer {
  margin-top: auto;
  text-align: right;
  padding-top: 12px;
}
.sell-rate-footer .rate-line {
  font-size: 12px;
  color: #94a3b8;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.sell-rate-footer .disclaimer {
  font-size: 11px;
  color: #cbd5e1;
  margin-top: 2px;
}

/* ====== DIVIDER ====== */
.internal-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  margin: 0;
  color: #94a3b8;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.internal-divider::before,
.internal-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

/* ====== INTERNAL AREA ====== */
.internal-area {
  background: #f1f4f9;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  padding: 16px 20px;
  margin-top: 0;
}
.internal-area .section-title {
  font-size: 13px;
  font-weight: 600;
  color: #1e3a5f;
  margin-bottom: 10px;
}

/* Internal form */
.int-form { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; flex-wrap: wrap; }
.int-form .fg { flex: 1; min-width: 80px; }
.int-form .fg label { display: block; font-size: 11px; color: #64748b; margin-bottom: 2px; }
.int-form .fg input {
  width: 100%;
  padding: 6px 0;
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  border: none;
  border-bottom: 1.5px solid #d0d5dd;
  outline: none;
  background: transparent;
}
.int-form .fg input:focus { border-color: #1e3a5f; }
.int-form .total-badge {
  font-size: 13px;
  color: #1e3a5f;
  font-weight: 600;
  white-space: nowrap;
  padding-bottom: 6px;
}

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 13px; margin-bottom: 14px; }
.detail-grid .item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
.detail-grid .item .l { color: #64748b; }
.detail-grid .item .r { font-weight: 600; color: #1e293b; }
.detail-grid .item .r.profit { color: #059669; }

/* Script */
.script-wrap { position: relative; }
.script-wrap textarea {
  width: 100%;
  height: 110px;
  padding: 12px;
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid #d0d5dd;
  border-radius: 4px;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #fff;
  color: #1e293b;
}
.script-wrap textarea:focus { border-color: #1e3a5f; }
.script-copy-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  background: #1e3a5f;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.script-copy-btn:active { transform: scale(.95); }

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity .5s, visibility .5s;
}
.loading-overlay.hidden { opacity: 0; visibility: hidden; }
.loader { width: 40px; height: 40px; margin-bottom: 16px; }
.loader .spinner {
  width: 40px; height: 40px;
  border: 3px solid #e2e8f0;
  border-top-color: #1e3a5f;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #64748b; }

/* Manual rate */
.manual-rate-area { display: none; margin-bottom: 10px; flex-shrink: 0; }
.manual-rate-area.show { display: block; }
.manual-rate-area .hint { font-size: 12px; color: #dc2626; margin-bottom: 4px; }
.manual-rate-area input {
  width: 100%;
  padding: 6px 0;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-bottom: 1.5px solid #dc2626;
  outline: none;
  background: transparent;
}

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  opacity: 0;
  transition: transform .3s ease, opacity .3s ease;
  z-index: 1000;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 420px) {
  .client-header { padding: 12px 14px; }
  .client-header h1 { font-size: 14px; }
  .client-body { padding: 16px 18px; }
  .converter-row input { font-size: 28px; padding: 10px 0; }
  .converter-row input::placeholder { font-size: 22px; }
  .converter-result .result-value { font-size: 28px; padding: 10px 0; min-height: 56px; }
  .converter-divider { padding: 4px 0; font-size: 16px; }
  .internal-area { padding: 14px; }
}
@media (max-height: 640px) {
  .client-header { padding: 10px 14px; }
  .client-body { padding: 12px 18px; }
  .converter-row input { font-size: 24px; padding: 8px 0; }
  .converter-row input::placeholder { font-size: 18px; }
  .converter-result .result-value { font-size: 24px; padding: 8px 0; min-height: 44px; }
  .converter-divider { padding: 2px 0; font-size: 14px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"><div class="spinner"></div></div>
  <div class="loading-text">正在获取最新汇率...</div>
</div>

<div class="toast" id="toast"></div>

<div class="container">

  <!-- ========== CLIENT AREA ========== -->
  <div class="client-area">

    <div class="client-header">
      <h1>MYR ⇄ CNY 汇率换算</h1>
      <div class="header-flags">
        <img src="https://flagcdn.com/24x18/my.png" alt="MY" loading="lazy">
        <img src="https://flagcdn.com/24x18/cn.png" alt="CN" loading="lazy">
      </div>
    </div>

    <div class="client-body">

      <div class="converter">

        <div class="converter-row">
          <div class="currency-label"><img class="flag" src="https://flagcdn.com/16x12/my.png" alt="" loading="lazy"> Malaysian Ringgit</div>
          <input type="text" id="myrInput" inputmode="decimal" placeholder="0.00">
        </div>

        <div class="converter-divider">▼</div>

        <div class="converter-result">
          <div class="currency-label"><img class="flag" src="https://flagcdn.com/16x12/cn.png" alt="" loading="lazy"> Chinese Yuan</div>
          <div class="result-value" id="cnyDisplay"><span style="color:#94a3b8;font-weight:400;font-size:20px">0.00</span></div>
        </div>

      </div>

      <!-- Manual rate -->
      <div class="manual-rate-area" id="manualRateArea">
        <div class="hint">汇率获取失败，请手动输入</div>
        <input type="number" id="manualRate" step="0.0001" min="0.01" value="0.61" placeholder="0.61">
      </div>

      <!-- Sell rate footer -->
      <div class="sell-rate-footer">
        <div class="rate-line">
          <img class="flag" src="https://flagcdn.com/16x12/cn.png" alt="" loading="lazy">
          卖出汇率
          <span id="sellRateDisplay">—</span>
          <img class="flag" src="https://flagcdn.com/16x12/my.png" alt="" loading="lazy">
        </div>
        <div class="disclaimer">仅供参考，以实际出票为准</div>
      </div>

    </div>
  </div>

  <!-- ========== DIVIDER ========== -->
  <div class="internal-divider">内部参考</div>

  <!-- ========== INTERNAL AREA ========== -->
  <div class="internal-area">

    <div class="section-title">票务信息</div>

    <div class="int-form">
      <div class="fg">
        <label><img class="flag" src="https://flagcdn.com/16x12/my.png" alt="" loading="lazy">单张票价</label>
        <input type="number" id="perPrice" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="fg" style="flex:0 0 70px">
        <label>张数</label>
        <input type="number" id="qtyInput" value="2" min="1" step="1">
      </div>
      <div class="total-badge" id="totalBadge">RM —</div>
    </div>

    <div class="section-title">计算明细</div>

    <div class="detail-grid">
      <div class="item"><span class="l">官方汇率</span><span class="r" id="intOfficial">—</span></div>
      <div class="item"><span class="l">报价汇率</span><span class="r" id="intQuote">—</span></div>
      <div class="item"><span class="l">马币总计</span><span class="r" id="intMYR">—</span></div>
      <div class="item"><span class="l">人民币总价</span><span class="r" id="intCNY">—</span></div>
      <div class="item"><span class="l">预计利润</span><span class="r profit" id="intProfit">—</span></div>
    </div>

    <div class="section-title">回复话术</div>

    <div class="script-wrap">
      <textarea id="scriptText" readonly placeholder="填写票价和张数后自动生成..."></textarea>
      <button class="script-copy-btn" id="copyBtn">复制</button>
    </div>

  </div>

</div>

<script>
(function() {
  let officialRate = null;
  let quoteRate = null;
  let updating = false;

  const DOM = {
    loading: document.getElementById('loadingOverlay'),
    myrInput: document.getElementById('myrInput'),
    cnyDisplay: document.getElementById('cnyDisplay'),
    sellRateDisplay: document.getElementById('sellRateDisplay'),
    manualRateArea: document.getElementById('manualRateArea'),
    manualRate: document.getElementById('manualRate'),
    perPrice: document.getElementById('perPrice'),
    qtyInput: document.getElementById('qtyInput'),
    totalBadge: document.getElementById('totalBadge'),
    intOfficial: document.getElementById('intOfficial'),
    intQuote: document.getElementById('intQuote'),
    intMYR: document.getElementById('intMYR'),
    intCNY: document.getElementById('intCNY'),
    intProfit: document.getElementById('intProfit'),
    scriptText: document.getElementById('scriptText'),
    copyBtn: document.getElementById('copyBtn'),
    toast: document.getElementById('toast'),
  };

  let toastTimer = null;
  function showToast(msg) {
    const el = DOM.toast;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function fmt(v, d) { return Number(v).toFixed(d); }

  function formatNum(n) {
    const s = fmt(n, 2);
    const parts = s.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  }

  function updateAll() {
    if (officialRate === null) return;

    const totalMYR = parseFloat(DOM.myrInput.value) || 0;

    if (totalMYR <= 0) {
      DOM.cnyDisplay.innerHTML = '<span style="color:#94a3b8;font-weight:400;font-size:20px">0.00</span>';
      DOM.sellRateDisplay.textContent = '—';
      clearInternal();
      return;
    }

    const qRate = officialRate - 0.05;
    quoteRate = qRate;

    DOM.sellRateDisplay.textContent = '1 CNY = ' + fmt(qRate, 4) + ' MYR';

    let cny = totalMYR / qRate;
    const qty = parseInt(DOM.qtyInput.value) || 0;
    if (qty >= 4) {
      cny = Math.floor(cny / 10) * 10;
    } else {
      cny = Math.round(cny);
    }

    DOM.cnyDisplay.textContent = fmt(cny, 0);

    // Internal
    const perPrice = parseFloat(DOM.perPrice.value) || 0;
    const intQty = qty || 0;

    if (perPrice > 0 && intQty > 0) {
      DOM.totalBadge.textContent = 'RM ' + fmt(perPrice * intQty, 2);
    } else {
      DOM.totalBadge.textContent = 'RM —';
    }

    DOM.intOfficial.textContent = '1 CNY = ' + fmt(officialRate, 4) + ' MYR';
    DOM.intQuote.textContent = '1 CNY = ' + fmt(qRate, 4) + ' MYR';
    DOM.intMYR.textContent = 'RM ' + fmt(totalMYR, 2);
    DOM.intCNY.textContent = '¥' + cny;

    const cost = totalMYR / officialRate;
    const profit = cny - cost;
    DOM.intProfit.textContent = '¥' + fmt(profit, 2);

    // Script
    if (perPrice > 0 && intQty > 0) {
      const s = `亲亲，${intQty} 张车票一共是 ${fmt(perPrice * intQty, 2)} 马币。我这边是纯代买，不收任何额外的手续费和跑腿费哦。今天的实时结算汇率是 1 人民币 = ${fmt(qRate, 4)} 马币。总共是 ${cny} 元人民币。您直接转账就行，付完款我这边立刻登录马铁官网帮您出票，把 PDF 电子票发您。`;
      DOM.scriptText.value = s;
    }
  }

  function clearInternal() {
    DOM.totalBadge.textContent = 'RM —';
    DOM.intOfficial.textContent = '—';
    DOM.intQuote.textContent = '—';
    DOM.intMYR.textContent = '—';
    DOM.intCNY.textContent = '—';
    DOM.intProfit.textContent = '—';
    DOM.scriptText.value = '';
  }

  // Client MYR input → triggers full update
  DOM.myrInput.addEventListener('input', function() {
    if (updating) return;
    const totalMYR = parseFloat(this.value) || 0;
    const qty = parseInt(DOM.qtyInput.value) || 1;
    if (qty > 0) {
      updating = true;
      DOM.perPrice.value = totalMYR > 0 ? fmt(totalMYR / qty, 2) : '';
      updating = false;
    }
    updateAll();
  });

  // Internal price/qty → sync to client MYR
  function syncFromInternal() {
    if (updating) return;
    const perPrice = parseFloat(DOM.perPrice.value) || 0;
    const qty = parseInt(DOM.qtyInput.value) || 0;
    if (perPrice > 0 && qty > 0) {
      updating = true;
      DOM.myrInput.value = fmt(perPrice * qty, 2);
      updating = false;
      updateAll();
    } else {
      updateAll();
    }
  }

  DOM.perPrice.addEventListener('input', syncFromInternal);
  DOM.qtyInput.addEventListener('input', function() {
    syncFromInternal();
    // Also re-multiply: update perPrice display if myrInput has value
    if (!updating) {
      const totalMYR = parseFloat(DOM.myrInput.value) || 0;
      const qty = parseInt(this.value) || 1;
      if (totalMYR > 0 && qty > 0) {
        updating = true;
        DOM.perPrice.value = fmt(totalMYR / qty, 2);
        updating = false;
      }
      updateAll();
    }
  });

  async function fetchRate() {
    try {
      const res = await fetch('/api/rate');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const rate = data.rates.MYR;
      if (!rate || rate <= 0) throw new Error('Invalid rate');
      return rate;
    } catch (e) {
      console.warn('API failed:', e);
      return null;
    }
  }

  async function init() {
    let rate = await fetchRate();
    if (rate === null) {
      DOM.manualRateArea.classList.add('show');
      DOM.manualRate.addEventListener('input', function() {
        const r = parseFloat(this.value);
        if (r && r > 0) {
          officialRate = r;
          updateAll();
        }
      });
      rate = parseFloat(DOM.manualRate.value) || 0.61;
    }

    officialRate = rate;
    DOM.manualRate.value = rate;
    DOM.loading.classList.add('hidden');
    updateAll();
  }

  DOM.copyBtn.addEventListener('click', function() {
    const text = DOM.scriptText.value;
    if (!text) { showToast('请先填写票价和张数'); return; }
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制');
    }).catch(() => {
      DOM.scriptText.select();
      document.execCommand('copy');
      showToast('已复制');
    });
  });

  init();
})();
</script>
</body>
</html>
